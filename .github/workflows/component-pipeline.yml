name: Component CI/CD Pipeline

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
        description: 'Component ID in Keboola Developer Portal (e.g. kds-team.ex-airtable)'
      vendor:
        required: true
        type: string
        description: 'Developer Portal vendor name (e.g. kds-team, keboola)'
      kbc_test_configs:
        required: false
        type: string
        default: ''
        description: 'Space-separated list of KBC test project config IDs'
      test_command:
        required: false
        type: string
        default: 'python -m pytest tests/ --tb=short -q'
        description: 'Test command to run inside the Docker container'
      dockerfile:
        required: false
        type: string
        default: './Dockerfile'
        description: 'Path to the Dockerfile'
      docker_build_target:
        required: false
        type: string
        default: ''
        description: 'Docker build target for the production image (for multi-stage builds)'
      test_build_target:
        required: false
        type: string
        default: ''
        description: 'Docker build target for the test image. When set, enables multi-stage mode: test image is built and tested separately, then production image is built for push.'
      context:
        required: false
        type: string
        default: '.'
        description: 'Docker build context directory'
      build_args:
        required: false
        type: string
        default: ''
        description: 'Docker build args (multiline KEY=VALUE)'
      update_properties_script:
        required: false
        type: string
        default: 'scripts/developer_portal/update_properties.sh'
        description: 'Path to the Developer Portal properties update script'
      kbc_developerportal_username:
        required: false
        type: string
        default: ''
        description: 'Developer Portal username (overrides vars.KBC_DEVELOPERPORTAL_USERNAME)'

jobs:
  push_event_info:
    name: Push Event Info
    runs-on: ubuntu-latest
    outputs:
      app_image_tag: ${{ steps.info.outputs.app_image_tag }}
      is_semantic_tag: ${{ steps.info.outputs.is_semantic_tag }}
      is_default_branch: ${{ steps.info.outputs.is_default_branch }}
      is_deploy_ready: ${{ steps.info.outputs.is_deploy_ready }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get push event info
        id: info
        uses: keboola/component-ci/actions/push-event-info@master

  # Builds the image used for testing.
  # Single-stage: builds as app_id (reused for push)
  # Multi-stage: builds as app_id-test (only for testing)
  build_test:
    name: Build Test Image
    runs-on: ubuntu-latest
    needs: push_event_info
    outputs:
      test_image_id: ${{ steps.set_ids.outputs.test_image_id }}
    steps:
      - name: Set image IDs
        id: set_ids
        run: |
          if [ -n "${{ inputs.test_build_target }}" ]; then
            echo "test_image_id=${{ inputs.app_id }}-test" >> $GITHUB_OUTPUT
          else
            echo "test_image_id=${{ inputs.app_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: keboola/component-ci/actions/docker-build@master
        with:
          app_id: ${{ steps.set_ids.outputs.test_image_id }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          build_target: ${{ inputs.test_build_target || inputs.docker_build_target }}
          build_args: ${{ inputs.build_args }}

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - build_test
    steps:
      - name: Load Docker image
        uses: keboola/component-ci/actions/docker-load@master
        with:
          app_id: ${{ needs.build_test.outputs.test_image_id }}

      - name: Run tests
        uses: keboola/component-ci/actions/run-tests@master
        with:
          app_id: ${{ needs.build_test.outputs.test_image_id }}
          test_command: ${{ inputs.test_command }}

  tests_kbc:
    name: Run KBC Tests
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - build_test
    steps:
      - name: Run KBC tests
        uses: keboola/component-ci/actions/kbc-tests@master
        with:
          app_id: ${{ inputs.app_id }}
          image_tag: ${{ needs.push_event_info.outputs.app_image_tag }}
          kbc_test_configs: ${{ inputs.kbc_test_configs }}
          kbc_storage_token: ${{ secrets.KBC_STORAGE_TOKEN }}

  # Only runs in multi-stage mode: builds the production image after tests pass
  build_production:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - tests
      - tests_kbc
    if: inputs.test_build_target != ''
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build production image
        uses: keboola/component-ci/actions/docker-build@master
        with:
          app_id: ${{ inputs.app_id }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          build_target: ${{ inputs.docker_build_target }}
          build_args: ${{ inputs.build_args }}

  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - tests
      - tests_kbc
      - build_production
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - name: Load Docker image
        uses: keboola/component-ci/actions/docker-load@master
        with:
          app_id: ${{ inputs.app_id }}

      - name: Push to ECR
        uses: keboola/component-ci/actions/push-to-ecr@master
        with:
          app_id: ${{ inputs.app_id }}
          vendor: ${{ inputs.vendor }}
          image_tag: ${{ needs.push_event_info.outputs.app_image_tag }}
          is_deploy_ready: ${{ needs.push_event_info.outputs.is_deploy_ready }}
          dockerhub_user: ${{ secrets.DOCKERHUB_USER }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          kbc_developerportal_username: ${{ inputs.kbc_developerportal_username != '' && inputs.kbc_developerportal_username || vars.KBC_DEVELOPERPORTAL_USERNAME }}
          kbc_developerportal_password: ${{ secrets.KBC_DEVELOPERPORTAL_PASSWORD }}

  deploy:
    name: Deploy to KBC
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - push
    if: needs.push_event_info.outputs.is_deploy_ready == 'true'
    steps:
      - name: Deploy
        uses: keboola/component-ci/actions/deploy@master
        with:
          app_id: ${{ inputs.app_id }}
          vendor: ${{ inputs.vendor }}
          image_tag: ${{ needs.push_event_info.outputs.app_image_tag }}
          kbc_developerportal_username: ${{ inputs.kbc_developerportal_username != '' && inputs.kbc_developerportal_username || vars.KBC_DEVELOPERPORTAL_USERNAME }}
          kbc_developerportal_password: ${{ secrets.KBC_DEVELOPERPORTAL_PASSWORD }}

  update_properties:
    name: Update Developer Portal Properties
    runs-on: ubuntu-latest
    needs:
      - push_event_info
      - push
    if: needs.push_event_info.outputs.is_deploy_ready == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update properties
        uses: keboola/component-ci/actions/update-properties@master
        with:
          app_id: ${{ inputs.app_id }}
          vendor: ${{ inputs.vendor }}
          kbc_developerportal_username: ${{ inputs.kbc_developerportal_username != '' && inputs.kbc_developerportal_username || vars.KBC_DEVELOPERPORTAL_USERNAME }}
          kbc_developerportal_password: ${{ secrets.KBC_DEVELOPERPORTAL_PASSWORD }}
          script_path: ${{ inputs.update_properties_script }}
