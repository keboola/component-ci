name: 'Docker Load'
description: 'Downloads Docker image artifact and loads it'

inputs:
  app_id:
    description: 'Component ID (e.g. kds-team.ex-airtable)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app_id }}
        path: /tmp

    - name: Load image
      shell: bash
      run: |
        docker load --input /tmp/${{ inputs.app_id }}.tar
        docker image ls -a
