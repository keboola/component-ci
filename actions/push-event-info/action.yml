name: Push Event Info
description: Determines image tag, branch info, and deploy-readiness from push event context

outputs:
  app_image_tag:
    description: Docker image tag derived from git ref
    value: ${{ steps.tag.outputs.app_image_tag }}
  is_semantic_tag:
    description: Whether the current ref is a semantic version tag (e.g. 1.2.3)
    value: ${{ steps.tag.outputs.is_semantic_tag }}
  is_default_branch:
    description: Whether the push is on the default branch
    value: ${{ steps.default_branch.outputs.is_default_branch }}
  is_deploy_ready:
    description: Whether conditions are met for deployment
    value: ${{ steps.deploy_ready.outputs.is_deploy_ready }}

runs:
  using: composite
  steps:
    - name: Fetch all branches and tags
      shell: bash
      run: git fetch --prune --unshallow --tags -f 2>/dev/null || git fetch --prune --tags -f

    - name: Get current branch name
      id: current_branch
      shell: bash
      run: |
        if [[ "${{ github.ref }}" != refs/tags/* ]]; then
          branch_name="${{ github.ref_name }}"
          echo "branch_name=$branch_name" | tee -a "$GITHUB_OUTPUT"
        else
          raw=$(git branch -r --contains "${{ github.ref }}")
          branch="$(echo "${raw/*origin\//}" | tr -d '\n')"
          echo "branch_name=$branch" | tee -a "$GITHUB_OUTPUT"
        fi

    - name: Is current branch the default branch
      id: default_branch
      shell: bash
      run: |
        echo "default_branch=${{ github.event.repository.default_branch }}"
        if [ "${{ github.event.repository.default_branch }}" = "${{ steps.current_branch.outputs.branch_name }}" ]; then
          echo "is_default_branch=true" | tee -a "$GITHUB_OUTPUT"
        else
          echo "is_default_branch=false" | tee -a "$GITHUB_OUTPUT"
        fi

    - name: Set image tag
      id: tag
      shell: bash
      run: |
        REF="${GITHUB_REF##*/}"
        if [ "${{ github.ref_type }}" = "tag" ]; then
          TAG="$REF"
        else
          TAG="$REF-${{ github.run_number }}"
        fi
        IS_SEMANTIC_TAG=$(echo "$REF" | grep -q '^[0-9]\+\.[0-9]\+\.[0-9]\+$' && echo true || echo false)
        echo "is_semantic_tag=$IS_SEMANTIC_TAG" | tee -a "$GITHUB_OUTPUT"
        echo "app_image_tag=$TAG" | tee -a "$GITHUB_OUTPUT"

    - name: Deploy-Ready check
      id: deploy_ready
      shell: bash
      run: |
        if [[ "${{ steps.default_branch.outputs.is_default_branch }}" == "true" \
          && "${{ github.ref }}" == refs/tags/* \
          && "${{ steps.tag.outputs.is_semantic_tag }}" == "true" ]]; then
          echo "is_deploy_ready=true" | tee -a "$GITHUB_OUTPUT"
        else
          echo "is_deploy_ready=false" | tee -a "$GITHUB_OUTPUT"
        fi
