name: Docker Build
description: Builds Docker image and uploads as artifact

inputs:
  app_id:
    description: Component ID (e.g. kds-team.ex-airtable)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: ./Dockerfile
  context:
    description: Docker build context
    required: false
    default: "."
  build_target:
    description: Docker build target (for multi-stage builds)
    required: false
    default: ""
  build_args:
    description: Docker build args (multiline KEY=VALUE)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.build_target || '' }}
        tags: ${{ inputs.app_id }}:latest
        outputs: type=docker,dest=/tmp/${{ inputs.app_id }}.tar
        build-args: ${{ inputs.build_args }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.app_id }}
        path: /tmp/${{ inputs.app_id }}.tar
